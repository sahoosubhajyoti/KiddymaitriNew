name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 168.231.103.156
          username: km_webapp
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/.next,frontend/public,frontend/package.json"
          target: "/home/km_webapp/kiddymaitri-new"

      - name: Restart app
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 168.231.103.156
          username: km_webapp
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/km_webapp/kiddymaitri-new/frontend
            npm install --production
            pm2 restart kiddymaitri-frontend